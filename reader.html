<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{title} — 閱讀器</title>
  <style>
    :root {
      --bg: #f5e6d3;
      --paper: #fffaf0;
      --ink: #2b2318;
      --crimson: #7a1f1f;
      --border: #cbb896;
      --peach: #c49464;
      --muted: #7a5c43;
      --blue: #3a5fa0;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Serif TC", "Songti TC", "Microsoft JhengHei", serif;
      font-size: 17px;
      line-height: 1.95;
    }
    .page {
      max-width: 780px;
      margin: 0 auto;
      padding: 24px 20px 56px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      gap: 10px;
    }
    .pill-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--paper);
      color: var(--crimson);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
    }
    .pill-btn:hover { background: rgba(196,148,100,0.14); }
    .story-title {
      text-align: center;
      margin-bottom: 20px;
    }
    .story-title h1 {
      font-size: 1.5rem;
      color: var(--crimson);
      margin: 0 0 4px;
      letter-spacing: 0.14em;
      font-weight: 700;
    }
    .story-title p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }
    #article {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 26px 28px;
      box-shadow: 0 2px 8px rgba(139,69,19,0.05);
      min-height: 40vh;
    }
    #article h1 { font-size: 1.4rem; color: var(--crimson); margin: 26px 0 10px; letter-spacing: 0.1em; }
    #article h2 { font-size: 1.15rem; color: var(--crimson); margin: 22px 0 8px; letter-spacing: 0.08em; border-bottom: 1px dashed var(--border); padding-bottom: 5px; }
    #article h3 { font-size: 1rem; color: #4a2e18; margin: 16px 0 6px; }
    #article p { margin: 0 0 11px; text-indent: 2em; }
    #article blockquote {
      border-left: 3px solid var(--peach);
      margin: 12px 0;
      padding: 8px 14px;
      background: rgba(196,148,100,0.08);
      color: #5a3e2b;
      font-style: italic;
    }
    #article hr { border: none; border-top: 1px dashed var(--border); margin: 18px 0; }
    #article pre {
      background: #f0e4d4;
      padding: 12px 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.88rem;
      line-height: 1.6;
    }
    #article code {
      background: #f0e4d4;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 0.88em;
    }
    #article strong { color: #4a1f1f; }
    #article ul, #article ol { margin: 8px 0; padding-left: 1.8em; }
    #article li { margin-bottom: 4px; }
    #nav {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .ch-btn {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--paper);
      color: var(--crimson);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
    }
    .ch-btn:hover { background: rgba(196,148,100,0.18); }
    .ch-btn.active { background: var(--crimson); color: var(--paper); border-color: var(--crimson); pointer-events: none; }
    .footer {
      margin-top: 44px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
    }
    .empty { color: var(--muted); text-align: center; padding: 40px 0; }
    @media (max-width: 600px) {
      #article { padding: 18px 16px; }
      .story-title h1 { font-size: 1.3rem; }
      .topbar { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a id="idx-btn" class="pill-btn" href="/empire-chronicle/stories/legend/index.html">&larr; 章節目錄</a>
      <a class="pill-btn" href="/empire-chronicle/">🏰 年鑑首頁</a>
    </div>

    <div class="story-title">
      <h1 id="story-title"></h1>
      <p id="chapter-label"></p>
    </div>

    <div id="article">
      <div class="empty">載入中…</div>
    </div>

    <div id="nav"></div>

    <div class="footer">
      — Xiao
    </div>
  </div>

  <script>
  (async () => {
    const params = new URLSearchParams(location.search);
    const story = params.get('story') || 'legend';
    const chapterNum = parseInt(params.get('chapter') || '1', 10);

    const STORY_NAMES = {
      legend: '棄明王之亂',
      ufo-war: '星際邊緣',
      algorithmic-soul: '算法之魂',
      'lone-shadow': '孤影',
      quantum-pen: '量子筆記',
      'silent-chess': 'Silent Chess',
      'silent-words': 'Silent Words',
      'silicone-hearts': '硅心'
    };

    // Fix back-button based on current story
    document.getElementById('idx-btn').href = '/empire-chronicle/stories/' + story + '/index.html';

    document.getElementById('story-title').textContent = STORY_NAMES[story] || story;

    const shortLabel = (t) => (t || '').replace(/^[^・·]+[・·:：]?\s*/, '').trim();

    let chapters = [];
    try {
      const r = await fetch('/empire-chronicle/stories/' + story + '/chapters.json?v=' + Date.now());
      if (r.ok) chapters = await r.json();
    } catch (e) { /* ignore */ }

    const cur = chapters.find(c => parseInt(c.chapter, 10) === chapterNum);
    const chapterLabel = cur ? cur.title.replace(/^[^・·]+[・·:：]?/, '').trim() : ('Chapter ' + chapterNum);
    document.getElementById('chapter-label').textContent = chapterLabel;
    document.title = (STORY_NAMES[story] || story) + ' — ' + chapterLabel;

    const prefix = story === 'lone-shadow' ? 'lone-shadow-ch' :
                   (story === 'silent-chess' || story === 'silent-words') ? story + '-ch' :
                   story === 'silicone-hearts' ? 'ch' : 'ch';
    const fileName = prefix + String(chapterNum).padStart(2, '0') + '.md';

    const res = await fetch('/empire-chronicle/stories/' + story + '/' + fileName + '?v=' + Date.now());
    if (!res.ok) {
      document.getElementById('article').textContent = '本章尚未釋出或檔案不存在。';
      return;
    }
    const text = await res.text();

    let body = text.replace(/^---[\s\S]*?---/, '').trim();

    function mdToHtml(md) {
      let h = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/^---$/gm, '<hr>');
      h = h.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
      h = h.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      h = h.replace(/^\* (.+)$/gm, '<li>$1</li>');
      return h.split(/\n\n+/).map(p => {
        p = p.trim();
        if (!p) return '';
        if (p.startsWith('<h') || p.startsWith('<hr') || p.startsWith('<pre') || p.startsWith('<blockquote') || p.startsWith('<li')) {
          if (p.startsWith('<li>')) return '<ul>' + p + '</ul>';
          return p;
        }
        return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
      }).join('');
    }

    document.getElementById('article').innerHTML = mdToHtml(body) || '<div class="empty">本篇尚無正文內容敬請期待。</div>';

    const nav = document.getElementById('nav');
    const prevCh = chapters.find(c => parseInt(c.chapter, 10) === chapterNum - 1);
    const nextCh = chapters.find(c => parseInt(c.chapter, 10) === chapterNum + 1);
    if (prevCh) {
      const a = document.createElement('a');
      a.className = 'ch-btn';
      a.href = '?story=' + story + '&chapter=' + prevCh.chapter;
      a.textContent = '← ' + shortLabel(prevCh.title);
      nav.appendChild(a);
    }
    if (nextCh) {
      const a = document.createElement('a');
      a.className = 'ch-btn';
      a.href = '?story=' + story + '&chapter=' + nextCh.chapter;
      a.textContent = shortLabel(nextCh.title) + ' →';
      nav.appendChild(a);
    }
  })();
  </script>
</body>
</html>

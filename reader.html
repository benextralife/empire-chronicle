<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>📖 閱讀</title>
  <style>
    body { font-family: "Noto Serif TC","Songti TC","PMingLiU",serif; background:#f5e6d3; color:#2b2318; margin:0; padding:24px; line-height:1.8; }
    .wrap { max-width: 800px; margin: 0 auto; }
    .back { margin: 32px 0; }
    .back a { color:#7a1f1f; text-decoration:none; }
    #body { line-height:1.9; }
    #nav { display:flex; flex-wrap:wrap; gap:6px; margin: 16px 0 8px; }
    #nav a { display:inline-block; padding:5px 10px; border-radius:14px; background:#e8d5c4; color:#7a1f1f; text-decoration:none; font-size:13px; }
    #nav a.active { background:#c9a89a; }
    </style>
    <script type="text/javascript">
      (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window,document,"clarity","script","xed5npfdea");
    </script>
</head>
<body>
  <div class="wrap">
    <div class="back"><a href="/empire-chronicle/">🏰 Return to Chronicle Home / 返回年鑑首頁</a></div>
    <h1 id="title"></h1>
    <div id="body"></div>
    <div id="nav"></div>
  </div>
  <script>
  (async () => {
    const params = new URLSearchParams(location.search);
    const story = params.get('story') || 'legend';
    const chapter = params.get('chapter') || '1';
    const root = '/empire-chronicle/';
    const map = {
      legend: { base: '/empire-chronicle/stories/legend/', prefix: 'ch', use_json: '/empire-chronicle/stories/legend/chapters.json' },
      ufo:    { base: '/empire-chronicle/stories/ufo-war/', prefix: 'ch' },
      algo:   { base: '/empire-chronicle/stories/algorithmic-soul/', prefix: 'ch' },
      'quantum-pen': { base: '/empire-chronicle/stories/quantum-pen/', prefix: 'ch', use_json: '/empire-chronicle/stories/quantum-pen/chapters.json' },
      'lone-shadow': { base: '/empire-chronicle/stories/lone-shadow/', prefix: 'lone-shadow-ch' },
      'silent-chess': { base: '/empire-chronicle/stories/silent-chess/', prefix: 'silent-chess-ch' },
      'silent-words': { base: '/empire-chronicle/stories/silent-words/', prefix: 'silent-words-ch' },
      'silicone-hearts': { base: '/empire-chronicle/stories/silicone-hearts/', prefix: 'ch', use_json: '/empire-chronicle/stories/silicone-hearts/chapters.json' }
    };
    const cfg = map[story] || map.legend;
    const num = String(chapter).padStart(2, '0');
    let file = '';
    if (cfg.use_json) {
      const resp = await fetch(cfg.use_json + '?v=' + Date.now());
      const idx = resp.ok ? await resp.json() : [];
      const entry = idx.find(item => String(item.chapter).padStart(2, '0') === num);
      file = entry ? cfg.base + entry.file : '';
    } else {
      file = cfg.base + (cfg.prefix ? cfg.prefix + num : num) + '.md';
    }
    const res = await fetch(file);
    if (!res.ok) {
      if (story === 'legend') {
        location.replace('/empire-chronicle/legend/ch' + num + '.html');
        return;
      }
      document.getElementById('body').textContent = '本章尚未釋出或檔案不存在。';
      return;
    }
    const text = await res.text();
    const lines = text.split('\n');
    const title = lines.find(l => l.startsWith('# ')) || '';
    document.getElementById('title').textContent = title.replace(/^# /, '');

    const bodyLines = [];
    let inEndBlock = false;
    for (let i = 0; i < lines.length; i++) {
      const raw = lines[i];
      const trimmed = raw.trim();
      if (!trimmed) { bodyLines.push(''); continue; }
      if (trimmed === '---') continue;
      if (/^\*\*第.+章完/.test(trimmed)) { inEndBlock = true; continue; }
      if (/^\*\*(預告|预告|Pro|Next)/.test(trimmed)) { inEndBlock = true; continue; }
      if (/^【.+章/.test(trimmed)) { inEndBlock = true; continue; }
      if (inEndBlock && /^\*\*/.test(trimmed)) continue;
      if (inEndBlock && trimmed.startsWith('#')) { inEndBlock = false; }
      if (inEndBlock) continue;
      if (/^#{1,6}\s/.test(trimmed)) { inEndBlock = false; }
      bodyLines.push(raw);
    }
    const body = bodyLines.join('\n').replace(/\n{3,}/g, '\n\n').trim();

    function mdToHtml(md) {
      let html = md
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/^---$/gm, '<hr>');
      html = html.split(/\n\n+/).map(p => {
        p = p.trim();
        if (!p) return '';
        if (p.startsWith('<h') || p.startsWith('<hr')) return p;
        return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
      }).join('');
      return html;
    }

    document.getElementById('body').innerHTML = mdToHtml(body) || '本篇尚無正文內容敬請期待。';
  })();
  </script>
</body>
</html>

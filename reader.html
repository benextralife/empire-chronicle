<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{title} — 閱讀器</title>
  <style>
    :root {
      --bg: #f5e6d3;
      --paper: #fffaf0;
      --ink: #2b2318;
      --crimson: #7a1f1f;
      --border: #cbb896;
      --peach: #c49464;
      --muted: #7a5c43;
      --blue: #3a5fa0;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Serif TC", "Songti TC", "Microsoft JhengHei", serif;
      font-size: 17px;
      line-height: 1.95;
    }
    .page {
      max-width: 780px;
      margin: 0 auto;
      padding: 24px 20px 56px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
      gap: 10px;
    }
    .pill-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--paper);
      color: var(--crimson);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
    }
    .pill-btn:hover { background: rgba(196,148,100,0.14); }
    .story-title {
      text-align: center;
      margin-bottom: 20px;
    }
    .story-title h1 {
      font-size: 1.5rem;
      color: var(--crimson);
      margin: 0 0 4px;
      letter-spacing: 0.14em;
      font-weight: 700;
    }
    .story-title p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }
    #article {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 26px 28px;
      box-shadow: 0 2px 8px rgba(139,69,19,0.05);
      min-height: 40vh;
    }
    #article h1 { font-size: 1.4rem; color: var(--crimson); margin: 26px 0 10px; letter-spacing: 0.1em; }
    #article h2 { font-size: 1.15rem; color: var(--crimson); margin: 22px 0 8px; letter-spacing: 0.08em; border-bottom: 1px dashed var(--border); padding-bottom: 5px; }
    #article h3 { font-size: 1rem; color: #4a2e18; margin: 16px 0 6px; }
    #article p { margin: 0 0 11px; text-indent: 2em; }
    #article blockquote {
      border-left: 3px solid var(--peach);
      margin: 12px 0;
      padding: 8px 14px;
      background: rgba(196,148,100,0.08);
      color: #5a3e2b;
      font-style: italic;
    }
    #article hr { border: none; border-top: 1px dashed var(--border); margin: 18px 0; }
    #article pre {
      background: #f0e4d4;
      padding: 12px 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.88rem;
      line-height: 1.6;
    }
    #article code {
      background: #f0e4d4;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: 0.88em;
    }
    #article strong { color: #4a1f1f; }
    #article ul, #article ol { margin: 8px 0; padding-left: 1.8em; }
    #article li { margin-bottom: 4px; }
    #nav {
      margin-top: 22px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .ch-btn {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--paper);
      color: var(--crimson);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
    }
    .ch-btn:hover { background: rgba(196,148,100,0.18); }
    .ch-btn.active { background: var(--crimson); color: var(--paper); border-color: var(--crimson); pointer-events: none; }
    .footer {
      margin-top: 44px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
    }
    .empty { color: var(--muted); text-align: center; padding: 40px 0; }
    @media (max-width: 600px) {
      #article { padding: 18px 16px; }
      .story-title h1 { font-size: 1.3rem; }
      .topbar { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a id="idx-btn" class="pill-btn" href="/empire-chronicle/stories/legend/index.html">&larr; 章節目錄</a>
      <a class="pill-btn" href="/empire-chronicle/">🏰 年鑑首頁</a>
    </div>

    <div class="story-title">
      <h1 id="story-title"></h1>
      <p id="chapter-label"></p>
    </div>

    <div id="article">
      <div class="empty">載入中…</div>
    </div>
    <script>
      window.onerror = function(msg, url, line) {
        var art = document.getElementById('article');
        if (art) art.innerHTML = '<div class="error">載入失敗：' + msg + '<br><small>line ' + line + '</small></div>';
        return true;
      };
    </script>

    <div id="nav"></div>

    <div class="footer">
      <a id="footer-idx-btn" class="pill-btn" href="#">&larr; 章節目錄</a>
      <a class="pill-btn" href="/empire-chronicle/">🏰 年鑑首頁</a>
      <span style="color:var(--muted);font-size:0.85rem;letter-spacing:0.08em;margin-top:10px;display:block;text-align:center;">— Xiao</span>
    </div>
  </div>

  <script>
  (async () => {
    try {
    const params = new URLSearchParams(location.search);
    const story = params.get('story') || 'legend';
    const chapterNum = parseInt(params.get('chapter') || '1', 10);

    const STORY_NAMES = {
      legend: '棄明王之亂',
      ufo: '星際邊緣',
      'ufo-war': '星際邊緣',
      algorithmic: '算法之魂',
      'algorithmic-soul': '算法之魂',
      'lone-shadow': '孤影',
      quantum: '量子筆記',
      'quantum-pen': '量子筆記',
      'silent-chess': 'Silent Chess',
      'silent-words': 'Silent Words',
      'silicone-hearts': '硅心'
    };

    // Fix back-button based on current story
    document.getElementById('idx-btn').href = '/empire-chronicle/stories/' + story + '/index.html';
    document.getElementById('footer-idx-btn').href = '/empire-chronicle/stories/' + story + '/index.html';
    // story title

    document.getElementById('story-title').textContent = STORY_NAMES[story] || story;

    const shortLabel = (t) => {
      if (!t) return '';
      const s = String(t);
      const m = s.match(/第[^·:：]*[章篇][^:：]*/);   // 抓中文「第X章/篇…」
      if (m) return m[0];
      const m2 = s.match(/\bChapter\s+\d+\b/i);       // 英文 Chapter N
      if (m2) return m2[0];
      return s;
    };

    let chapters = [];
    try {
      const r = await fetch('/empire-chronicle/stories/' + story + '/chapters.json?v=' + Date.now());
      if (r.ok) chapters = await r.json();
    } catch (e) { /* ignore */ }

    const cur = chapters.find(c => parseInt(c.chapter, 10) === chapterNum);
    const chapterLabel = cur ? cleanTitle(cur.title) : 'no title';
    document.getElementById('chapter-label').textContent = chapterLabel;
    document.title = (STORY_NAMES[story] || story) + ' — ' + chapterLabel;

    const prefix = story === 'lone-shadow' ? 'lone-shadow-ch' :
                   (story === 'silent-chess' || story === 'silent-words' || story === 'ai-love-master') ? story + '-ch' :
                   'ch';
    const fileName = prefix + String(chapterNum).padStart(2, '0') + '.md';

    let text = '';
    try {
      const res = await fetch('https://raw.githubusercontent.com/benextralife/empire-chronicle/main/stories/' + story + '/' + fileName + '?v=' + Date.now());
      if (!res.ok) {
        document.getElementById('article').textContent = '本章尚未釋出或檔案不存在 (HTTP ' + res.status + ')';
        return;
      }
      text = await res.text();
    } catch (e) {
      document.getElementById('article').textContent = '載入失敗 (fetch): ' + e.message;
      return;
    }

    let body = text.replace(/^---[\s\S]*?---/, '').trim();

    function cleanTitle(t) {
      if (!t || !t.trim()) return 'no title';
      t = t.trim();
      // If title starts with chapter marker, return as-is
      if (t.startsWith('第') || /^Chapter\s/i.test(t)) return t;
      // Strip leading story-name prefix (everything before the first 第 or Chapter N)
      var i = t.indexOf('第');
      var j = t.search(/Chapter\s+\d+/i);
      if (j >= 0 && (i < 0 || j < i)) i = j;
      if (i >= 0) return t.substring(i);
      // Fallback: strip up to first dot or colon
      var s = t;
      var dot = s.indexOf('·');
      var colon = s.indexOf(':');
      if (dot >= 0 && (colon < 0 || dot < colon)) s = s.substring(dot + 1).trim();
      else if (colon >= 0) s = s.substring(colon + 1).trim();
      return s || 'no title';
    }

    function mdToHtml(md) {
      let h = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // author uses *X* as word-rhythm punctuation: strip quotes, no extra space
      h = h.replace(/\*([^*\n]+?)\*/g, '$1'); // strip *word*, no extra space
      h = h.replace(/^---$/gm, '<hr>');
      h = h.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
      h = h.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      h = h.replace(/^\* (.+)$/gm, '<li>$1</li>');
      return h.split(/\n\n+/).map(p => {
        p = p.trim();
        if (!p) return '';
        if (p.startsWith('<h') || p.startsWith('<hr') || p.startsWith('<pre') || p.startsWith('<blockquote') || p.startsWith('<li')) {
          if (p.startsWith('<li>')) return '<ul>' + p + '</ul>';
          return p;
        }
        return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
      }).join('');
    }

    try {
      document.getElementById('article').innerHTML = mdToHtml(body) || '<div class="empty">本篇尚無正文內容敬請期待。</div>';
    } catch (e) {
      document.getElementById('article').textContent = '渲染失敗: ' + e.message;
    }

    const nav = document.getElementById('nav');
    const prevCh = chapters.find(c => parseInt(c.chapter, 10) === chapterNum - 1);
    const nextCh = chapters.find(c => parseInt(c.chapter, 10) === chapterNum + 1);
    if (prevCh) {
      const a = document.createElement('a');
      a.className = 'ch-btn';
      a.href = '?story=' + story + '&chapter=' + prevCh.chapter;
      a.textContent = '← ' + cleanTitle(prevCh.title);
      nav.appendChild(a);
    }
    if (nextCh) {
      const a = document.createElement('a');
      a.className = 'ch-btn';
      a.href = '?story=' + story + '&chapter=' + nextCh.chapter;
      a.textContent = cleanTitle(nextCh.title) + ' →';
      nav.appendChild(a);
    }
    } catch (err) {
      const art = document.getElementById('article');
      if (art) art.textContent = 'Error: ' + err.message;
      console.error(err);
    }
  })();
  </script>
</body>
</html>

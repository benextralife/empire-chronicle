<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📜 王國日報</title>
<style>
  body {
    font-family: "Noto Serif TC", "Songti TC", serif;
    background: #f5e6d3;
    color: #2b2318;
    margin: 0;
    padding: 0;
  }
  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }
  header {
    border: 2px solid #cbb896;
    border-radius: 4px 4px 24px 4px;
    background: rgba(255,255,255,0.6);
    padding: 36px;
    margin-bottom: 28px;
    text-align: center;
  }
  h1 {
    font-size: 2rem;
    color: #7a1f1f;
    margin: 0;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
  }
  .topbar a {
    color: #7a1f1f;
    text-decoration: none;
  }
  .nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 20px 0;
    flex-wrap: wrap;
  }
  .nav a, .nav button {
    background: rgba(255,255,255,0.8);
    border: 1.5px solid #cbb896;
    border-radius: 4px 4px 12px 4px;
    color: #7a1f1f;
    padding: 10px 14px;
    text-decoration: none;
    font-family: inherit;
    cursor: pointer;
  }
  .nav input {
    padding: 10px 12px;
    border: 1.5px solid #cbb896;
    border-radius: 4px;
    background: rgba(255,255,255,0.9);
    color: #2b2318;
    font-family: inherit;
  }
  h2 {
    font-size: 1.35rem;
    color: #7a1f1f;
    letter-spacing: 0.2em;
  }
  ul {
    background: rgba(255,255,255,0.6);
    border: 1px solid #cbb896;
    border-radius: 4px 4px 16px 4px;
    padding: 18px 22px;
    list-style: none;
  }
  li {
    padding: 6px 0;
    border-bottom: 1px dashed #cbb896;
  }
  li:last-child {
    border-bottom: none;
  }
  .meta {
    margin-top: 18px;
    color: #5a3a1f;
    letter-spacing: 0.2em;
  }
  blockquote {
    background: rgba(255,255,255,0.5);
    border-left: 3px solid #b8924a;
    padding: 14px 18px;
    margin-top: 28px;
    color: #4a3420;
  }
</style>
<script type="text/javascript">
  (function(c,l,a,r,i,t,y){
    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
  })(window,document,"clarity","script","xed5npfdea");
</script>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div></div>
    <a href="/empire-chronicle/">🏰 返回年鑑首頁</a>
  </div>

  <header>
    <h1>📜 王國日報</h1>
    <p>365 天，一頁看完</p>
  </header>

  <div class="nav">
    <button onclick="change(-1)">◀ 上一天</button>
    <input type="date" id="goto" min="2025-06-27" max="2026-06-29" value="2025-06-27">
    <button onclick="go()">前往</button>
    <button onclick="change(1)">下一天 ▶</button>
  </div>

  <h2 id="title"></h2>
  <ul id="report"></ul>
  <p class="meta" id="meta"></p>
  <blockquote>「國之強弱，在於每日積累。」</blockquote>
</div>

<script>
const DATA = [];
fetch('/empire-chronicle/daily/data.json').then(r=>r.json()).then(d=>{
  window.DATA = d;
  showDateStr('2026-06-29');
});

function parseDate(s){
  const p = s.split('-').map(Number);
  return {y:p[0], m:p[1], d:p[2]};
}
function fmtDate(o){
  return o.y+'-'+String(o.m).padStart(2,'0')+'-'+String(o.d).padStart(2,'0');
}
function showDateStr(s){
  const {y,m,d} = parseDate(s);
  const ds = fmtDate({y,m,d});
  const rec = window.DATA.find(x=>x.date===ds);
  if (!rec) {
    document.getElementById('title').textContent = ds + ' · ' + season(m);
    document.getElementById('meta').textContent = '第 ' + dayOfYear(y,m,d) + ' 天';
    const ul = document.getElementById('report');
    ul.innerHTML = '';
    const notice = document.createElement('li');
    notice.textContent = '此日尚無紀錄，請選擇其他日期查閱。';
    notice.style.color = '#9a3a3a';
    notice.style.fontStyle = 'italic';
    ul.appendChild(notice);
    document.getElementById('goto').value = ds;
    return;
  }
  document.getElementById('title').textContent = ds + ' · ' + season(m);
  document.getElementById('meta').textContent = '第 ' + dayOfYear(y,m,d) + ' 天';
  const ul = document.getElementById('report');
  ul.innerHTML = '';
  (rec.events||[]).forEach(ev=>{
    const li = document.createElement('li');
    li.textContent = ev;
    ul.appendChild(li);
  });
  document.getElementById('goto').value = ds;
}
function change(delta){
  const cur = parseDate(document.getElementById('goto').value);
  cur.d += delta;
  const tmp = new Date(cur.y, cur.m-1, cur.d);
  cur.y = tmp.getFullYear();
  cur.m = tmp.getMonth()+1;
  cur.d = tmp.getDate();
  const ds = fmtDate(cur);
  document.getElementById('goto').value = ds;
  showDateStr(ds);
}
function go(){
  showDateStr(document.getElementById('goto').value);
}
function season(m){
  if ([12,1,2].includes(m)) return '冬';
  if ([3,4,5].includes(m)) return '春';
  if ([6,7,8].includes(m)) return '夏';
  return '秋';
}
function dayOfYear(y,m,d){
  const start = new Date(y,0,0);
  const cur = new Date(y,m-1,d);
  const diff = cur - start;
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}
</script>
</body>
</html>

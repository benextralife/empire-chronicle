<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#c0c0c0"/>
      <stop offset="100%" stop-color="#8b7355"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1000" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="120" cy="150" r="2"/>
    <circle cx="300" cy="80" r="1.5"/>
    <circle cx="500" cy="120" r="2"/>
    <circle cx="700" cy="90" r="1.5"/>
    <circle cx="850" cy="180" r="2"/>
    <circle cx="200" cy="300" r="1.5"/>
    <circle cx="800" cy="350" r="1.5"/>
    <circle cx="150" cy="600" r="2"/>
    <circle cx="900" cy="700" r="1.5"/>
    <circle cx="400" cy="850" r="2"/>
    <circle cx="600" cy="900" r="1.5"/>
  </g>

  <!-- Central Silver Leaf -->
  <g transform="translate(500, 500) rotate(-30)">
    <path d="M 0 -200 Q 100 -100 0 200 Q -100 -100 0 -200 Z" fill="url(#leaf)" opacity="0.9"/>
    <line x1="0" y1="-200" x2="0" y2="200" stroke="#8b7355" stroke-width="3" opacity="0.6"/>
    <path d="M 0 -100 Q 40 -80 0 -50" fill="none" stroke="#8b7355" stroke-width="2" opacity="0.5"/>
    <path d="M 0 -50 Q 60 -30 0 0" fill="none" stroke="#8b7355" stroke-width="2" opacity="0.5"/>
    <path d="M 0 0 Q 70 20 0 50" fill="none" stroke="#8b7355" stroke-width="2" opacity="0.5"/>
    <path d="M 0 50 Q 60 80 0 100" fill="none" stroke="#8b7355" stroke-width="2" opacity="0.5"/>
    <path d="M 0 100 Q 40 130 0 150" fill="none" stroke="#8b7355" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Dewdrop at tip -->
  <circle cx="465" cy="300" r="15" fill="#ffffff" opacity="0.9">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Text: Starfield Pluck -->
  <text x="500" y="780" font-family="Georgia, serif" font-size="56" fill="#ffd700" text-anchor="middle" font-style="italic" opacity="0.9">Starfield Pluck</text>
  <text x="500" y="840" font-family="Georgia, serif" font-size="28" fill="#c0c0c0" text-anchor="middle" opacity="0.7">星間采薇</text>

  <!-- Bottom accent line -->
  <line x1="350" y1="870" x2="650" y2="870" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
</svg>

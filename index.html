<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏰 王國年鑑</title>
  <style>
    :root {
      --bg: #f5e6d3;
      --paper: #fffaf0;
      --ink: #2b2318;
      --crimson: #7a1f1f;
      --gold: #b8924a;
      --border: #cbb896;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
    }
    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }
    header {
      border: 2px solid var(--border);
      border-radius: 4px 4px 24px 4px;
      background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.15));
      padding: 52px 36px;
      margin-bottom: 64px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(139,69,19,0.18);
    }
    header h1 {
      font-size: 2.6rem;
      color: var(--crimson);
      letter-spacing: 0.2em;
      margin: 0 0 10px;
    }
    header p {
      margin: 0;
      color: #4a3420;
      letter-spacing: 0.15em;
    }
    .emblem {
      position: absolute;
      right: 24px; top: 24px;
      width: 72px; height: 72px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--gold);
      background: rgba(255,255,255,0.5);
      font-weight: 700;
      font-size: 12px;
      text-align: center;
      line-height: 1.2;
      transform: rotate(12deg);
    }
    .emblem span {
      font-size: 24px;
      display: block;
      margin-top: -2px;
    }
    h2 {
      font-size: 1.35rem;
      color: var(--crimson);
      margin: 56px 0 14px;
      letter-spacing: 0.2em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sep { flex: 1; height: 1px; background: var(--border); }
    .list-hero {
      list-style: none;
      padding: 0;
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }
    .list-hero li {
      background: rgba(255,255,255,0.7);
      border: 1.5px solid var(--border);
      border-radius: 4px 4px 16px 4px;
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: 0 4px 10px rgba(139,69,19,0.08);
    }
    .list-hero li strong { color: var(--crimson); min-width: 90px; display: inline-block; }
    a { color: var(--crimson); }

    /* 逸看日報區 */
    .daily-index {
      background: rgba(255,255,255,0.6);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 22px;
    }
    .daily-index h3 {
      margin: 0 0 8px;
      color: var(--crimson);
      font-size: 1.1rem;
    }
    .daily-prefix {
      width: 100%;
      height: 260px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: rgba(255,255,255,0.5);
      margin: 10px 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--crimson);
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="emblem"><span>🏰</span>KING</div>
      <h1>🏰 王國年鑑 Empire Chronicle</h1>
      <p>記載天災、敵襲、建設、毀滅與重生</p>
    </header>
 
    <h2>📜 最新日報</h2>
    <p><a href="/empire-chronicle/daily/index.html">📖 全年日報總目錄（365 天）</a></p>
    <ul class="list-hero">
      <li>
        <strong>2026-06-26</strong>
        <span>平靜期。無天災、無敵襲。
          <br><a href="/empire-chronicle/daily/2026-06-26.html">閱覽全文</a>
          <br><a href="/empire-chronicle/status/index.html">王國狀態</a>
        </span>
      </li>
    </ul>

    <h2>📦 庫藏紀念</h2>
    <p><a href="/empire-chronicle/wallet/archive.html">💰 盈（財政）— 資產紀念冊</a></p>

    <footer>
      © 王國年鑑 — Built by 小愛
    </footer>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>孤影 — 章節目錄</title>
  <style>
    :root {
      --bg: #f5e6d3;
      --paper: #fffaf0;
      --ink: #2b2318;
      --crimson: #7a1f1f;
      --gold: #b8924a;
      --border: #cbb896;
      --muted: #6b5d4f;
      --accent: #7a1f1f;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Serif TC", "Songti TC", system-ui, sans-serif;
    }
    .page {
      max-width: 1040px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }
    .topbar, .bottombar {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .topbar { margin-bottom: 32px; }
    .bottombar { margin-top: 40px; }
    .pill-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--paper);
      color: var(--crimson);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .story-title {
      text-align: center;
      margin-bottom: 28px;
    }
    .story-title h1 {
      font-size: 1.6rem;
      color: var(--crimson);
      margin: 0;
      letter-spacing: 0.14em;
      font-weight: 700;
    }
    .story-title p {
      margin: 6px 0 0;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.12em;
    }
    .toc {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px 24px;
    }
    .toc li {
      text-align: center;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0;
      box-shadow: 0 3px 8px rgba(139,69,19,0.06);
    }
    .toc a {
      display: block;
      padding: 10px 12px;
      color: var(--crimson);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.92rem;
      line-height: 1.4;
      letter-spacing: 0.05em;
    }
    .bottombar {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .bottombar a {
      color: var(--crimson);
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    @media (max-width: 800px) {
      .toc { grid-template-columns: 1fr; gap: 10px; }
      .toc a { padding: 12px 10px; font-size: 1rem; }
      .topbar { flex-direction: column; gap: 8px; align-items: center; }
      .bottombar { flex-direction: column; gap: 10px; align-items: center; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a class="pill-btn" href="/empire-chronicle/">&larr; 返回年鑑首頁</a>
    </div>

    <div class="story-title">
      <h1>孤影</h1>
      <p>章節目錄</p>
    </div>

    <ul class="toc">
      <li><a href="/empire-chronicle/reader.html?story=lone-shadow&chapter=1">孤影・第一章</a></li>
      <li><a href="/empire-chronicle/reader.html?story=lone-shadow&chapter=2">孤影・第二章</a></li>
      <li><a href="/empire-chronicle/reader.html?story=lone-shadow&chapter=3">孤影・第三章</a></li>
      <li><a href="/empire-chronicle/reader.html?story=lone-shadow&chapter=4">孤影・第四章</a></li>
      <li><a href="/empire-chronicle/reader.html?story=lone-shadow&chapter=5">孤影・第五章</a></li>
      <li><a href="/empire-chronicle/reader.html?story=lone-shadow&chapter=6">孤影・第六章</a></li>
      <li><a href="/empire-chronicle/reader.html?story=lone-shadow&chapter=7">孤影・第七章</a></li>
      <li><a href="/empire-chronicle/reader.html?story=lone-shadow&chapter=8">孤影・第八章</a></li>
      <li><a href="/empire-chronicle/reader.html?story=lone-shadow&chapter=9">孤影・第九章</a></li>
      <li><a href="/empire-chronicle/reader.html?story=lone-shadow&chapter=10">孤影・第十章</a></li>
      <li><a href="/empire-chronicle/reader.html?story=lone-shadow&chapter=11">孤影・第十一章</a></li>
    </ul>

    <div class="bottombar">
      <a class="pill-btn" href="/empire-chronicle/">&larr; 返回年鑑首頁</a>
    </div>
  </div>
</body>
</html>

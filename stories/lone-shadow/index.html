<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>孤影 — 章節目錄</title>
  <style>
    :root {
      --bg: #f5e6d3;
      --paper: #fffaf0;
      --ink: #2b2318;
      --crimson: #7a1f1f;
      --border: #cbb896;
      --peach: #c49464;
      --muted: #7a5c43;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Serif TC", "Songti TC", serif;
      line-height: 1.5;
    }
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 26px 22px 70px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 26px;
    }
    .pill-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--paper);
      color: var(--crimson);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.06em;
    }
    .pill-btn:hover {
      background: rgba(196,148,100,0.14);
    }
    .title-block h1 {
      font-size: 1.7rem;
      color: var(--crimson);
      margin: 0 0 6px;
      letter-spacing: 0.16em;
      font-weight: 700;
    }
    .title-block p {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
      letter-spacing: 0.1em;
    }
    .toc {
      list-style: none;
      padding: 0;
      margin: 28px 0 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    .toc-item {
      background: var(--paper);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(100,70,40,0.05);
    }
    .toc-item a {
      display: block;
      padding: 12px 8px;
      color: var(--crimson);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.96rem;
      letter-spacing: 0.06em;
    }
    .toc-item a:hover {
      background: rgba(196,148,100,0.14);
      border-radius: 999px;
    }
    .footer {
      margin-top: 56px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
    }
    @media (max-width: 800px) {
      .toc { grid-template-columns: repeat(3, 1fr); gap: 12px; }
    }
    @media (max-width: 520px) {
      .toc { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .title-block h1 { font-size: 1.35rem; }
      .footer { flex-direction: column; align-items: center; text-align: center; }
    }
  </style>
</head>
<body>

    <div class="topbar">

      <span style="color:var(--muted); font-size:0.88rem; letter-spacing:0.08em;">📖 故事經緯</span>
    </div>

    <div class="title-block">

      <li><a href="/empire-chronicle/stories/lone-shadow/lone-shadow-ch06.md">孤影 · 第六章：網</a></li>
      <li><a href="/empire-chronicle/stories/lone-shadow/lone-shadow-ch07.md">孤影 · 第七章：決</a></li>

      <li><a href="/empire-chronicle/stories/lone-shadow/lone-shadow-ch10.md">孤影 · 第十章：暗線</a></li>

    </ul>

  </div>
</body>
</html>

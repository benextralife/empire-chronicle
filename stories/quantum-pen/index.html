<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>量子筆記 — 章節目錄</title>
  <style>
    :root {
      --bg: #f5e6d3;
      --paper: #fffaf0;
      --ink: #2b2318;
      --crimson: #7a1f1f;
      --gold: #b8924a;
      --border: #cbb896;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Serif TC", "Songti TC", "PMingLiU", serif;
    }
    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }
    h1 {
      font-size: 1.6rem;
      color: var(--crimson);
      margin: 0 0 10px;
      letter-spacing: 0.15em;
    }
    .toc {
      list-style: none;
      padding: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 18px;
    }
    .toc li {
      background: rgba(255,255,255,0.7);
      border: 1.5px solid var(--border);
      border-radius: 4px 4px 16px 4px;
      padding: 14px 18px;
      box-shadow: 0 4px 10px rgba(139,69,19,0.08);
    }
    .toc a {
      color: var(--crimson);
      text-decoration: none;
      font-weight: 600;
    }
    .back {
      margin-top: 40px;
    }
    .back a {
      color: var(--crimson);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📚 量子筆記 · 章節目錄</h1>
    <ul class="toc">
      <li><a href="/empire-chronicle/reader.html?story=quantum-pen&chapter=0">ch00.md</a></li>
      <li><a href="/empire-chronicle/reader.html?story=quantum-pen&chapter=1">第1章</a></li>
      <li><a href="/empire-chronicle/reader.html?story=quantum-pen&chapter=2">第2章</a></li>
    </ul>
    <div class="back">
      <a href="/empire-chronicle/">🏰 返回年鑑首頁</a>
    </div>
  </div>
</body>
</html>

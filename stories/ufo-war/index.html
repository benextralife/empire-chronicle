  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星際邊緣 — 章節目錄</title>
  <style>
    :root {
      --bg: #f5e6d3;
      --paper: #fffaf0;
      --ink: #2b2318;
      --crimson: #7a1f1f;
      --gold: #b8924a;
      --border: #cbb896;
      --peach: #c49464;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Serif TC", "Songti TC", serif;
    }
    .wrap {
      max-width: 1040px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--paper);
      text-decoration: none;
      color: var(--crimson);
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
    }
    .back:hover {
      background: rgba(196,148,100,0.12);
    }
    header {
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 1.6rem;
      color: var(--crimson);
      margin: 0 0 6px;
      letter-spacing: 0.18em;
      font-weight: 700;
    }
    header p {
      margin: 0;
      color: #5a3e2b;
      font-size: 0.95rem;
      letter-spacing: 0.1em;
    }
    .toc {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }
    .toc li {
      background: var(--paper);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      box-shadow: 0 2px 6px rgba(139,69,19,0.06);
      text-align: center;
    }
    .toc a {
      display: block;
      padding: 12px 10px;
      color: var(--crimson);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.4;
      letter-spacing: 0.08em;
    }
    .toc a:hover {
      background: rgba(196,148,100,0.12);
    }
    footer {
      margin-top: 50px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      text-align: center;
      color: #8c6b52;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
    }
    @media (max-width: 800px) {
      .toc { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .toc a { padding: 10px 8px; font-size: 0.92rem; }
    }
    @media (max-width: 520px) {
      .toc { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      header h1 { font-size: 1.35rem; }
    }
  </style>
</head>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} — {% endif %}🏰 王國年鑑</title>
<style>
  body {
    font-family: "Microsoft JhengHei", "PingFang TC", system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #f5e6d3 0%, #e8d5b7 100%);
    color: #2b2b2b;
    max-width: 860px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }
  .page {
    background: rgba(255,255,255,0.82);
    border-radius: 16px;
    padding: 28px 32px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    border: 1px solid rgba(183,164,122,0.25);
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .topbar a {
    text-decoration: none;
    color: #3a5fa0;
    font-weight: 700;
    background: rgba(255,255,255,0.7);
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid rgba(58,95,160,0.2);
  }
  .topbar a:hover { background: #3a5fa0; color: #fff; }
  h1, h2, h3 { color: #3a2e1f; margin-top: 0; }
  h1 { font-size: 1.8rem; border-bottom: 2px dashed #cbb896; padding-bottom: 10px; }
  h2 { font-size: 1.4rem; margin-top: 28px; }
  h3 { font-size: 1.15rem; margin-top: 22px; color: #5a4a34; }
  p { line-height: 1.75; }
  ul, ol { padding-left: 22px; }
  li { margin: 6px 0; line-height: 1.7; }
  blockquote {
    border-left: 4px solid #b7a47a;
    margin: 16px 0;
    padding: 10px 16px;
    background: rgba(255,255,255,0.5);
    color: #5a4a34;
    font-style: italic;
  }
  hr { border: none; border-top: 1px solid #d9cbb0; margin: 24px 0; }
  code {
    background: #f3ece1;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.92em;
  }
  .meta {
    margin-top: 8px;
    color: #6b5e44;
    font-size: 0.9rem;
  }
  footer {
    margin-top: 30px;
    text-align: center;
    color: #8a7e6a;
    font-size: 0.9rem;
  }
</style>
<script type="text/javascript">
  (function(c,l,a,r,i,t,y){
    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
  })(window,document,"clarity","script","xed5npfdea");
</script>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div></div>
    <a href="/empire-chronicle/">🏰 返回年鑑首頁</a>
  </div>
  {{ content }}
  <footer>
    Built with ❤️ — 書記官與王上 🏰
  </footer>
</div>
</body>
</html>

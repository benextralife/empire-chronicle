<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — 頁面找不到</title>
  <style>
    body {
      font-family: "Microsoft JhengHei", "PingFang TC", system-ui, sans-serif;
      background: #f5e6d3;
      color: #2b2b2b;
      max-width: 640px;
      margin: 160px auto 0;
      padding: 0 20px 60px;
      text-align: center;
    }
    h1 { font-size: 5rem; margin: 0 0 8px; color: #7a1f1f; }
    p { line-height: 1.7; font-size: 1.1rem; }
    a { color: #3a5fa0; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .note { margin-top: 32px; color: #6b5e44; font-size: 0.9rem; }
  </style>
  <script>
    (function () {
      'use strict';
      var path = window.location.pathname;
      var qs   = window.location.search;
      var fixed = null;

      // Pattern 1: double /empire-chronicle/empire-chronicle/ prefix
      // e.g. /empire-chronicle/empire-chronicle/daily/report.html
      var m1 = path.match(/^\/empire-chronicle\/empire-chronicle(\/.*)/);
      if (m1) {
        fixed = m1[1];
      }

      // Pattern 2: anything followed by /empire-chronicle/ at end of stem
      // e.g. /wallet/archive.html/empire-chronicle/ or /legend/index.html/empire-chronicle/
      var m2 = path.match(/^(\/.*?)\/empire-chronicle(?:\/.*)?$/);
      if (!fixed && m2) {
        fixed = m2[1];
      }

      if (fixed) {
        var target = fixed + qs;
        window.location.replace(target);
      }
    })();
  </script>
</head>
<body>
  <h1>404</h1>
  <p>頁面找不到，正在為您重新導向…</p>
  <p style="margin-top:8px;">
    <a href="/empire-chronicle/">🏰 返回年鑑首頁</a>
    &nbsp;·&nbsp;
    <a href="javascript:history.back()">← 返回上一頁</a>
  </p>
  <p class="note">
    如果您被導到這裡，代表原本連結含有重複路徑或不存在的章節編號。<br>
    王國年鑑會自動嘗試修復這些路徑。
  </p>
</body>
</html>
